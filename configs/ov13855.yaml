sensor_entity: "m03_b_ov13855 3-0036"
media_cif: "/dev/media1"
media_isp: "/dev/media3"
sample_dir: "samples/ov13855"
stable_test_frames: 300
main_profile: "preview"

mount_baseline:
  mount_id: "workbench_main_v1"
  status: "fixed"
  orientation: "landscape"
  # Temporary test values for Phase 2A bring-up. Replace with final measured values before freezing the mount baseline.
  height_mm: "420"
  tilt_deg: "25"
  work_distance_mm: "510"
  coverage_note: "Center ROI fully visible. Left/right edges and all four corners remain inside frame. Planned grab ROI is fully covered with small margin."

validation_capture:
  root_dir: "samples/ov13855/validation"
  default_scene_tag: "empty_workbench"
  export_jpg: true
  manifest_path: "samples/ov13855/validation/manifest.jsonl"

profiles:
  preview:
    video_node: "/dev/video23"
    width: 1920
    height: 1080
    pixfmt: "NV12"
    fps: 30
    stream_skip: 10
  raw_debug:
    video_node: "/dev/video1"
    width: 4224
    height: 3136
    pixfmt: "BG10"
    stream_skip: 5

presets:
  auto_baseline:
    enabled: true
    description: "Current recommended preset. Keep driver defaults until control survey proves stable gains."
    disabled_reason: ""
    controls:
  workbench_balanced:
    enabled: true
    description: "Candidate preset for the fixed workbench scene. Keep controls empty until the survey identifies effective controls."
    disabled_reason: ""
    controls:
  workbench_lowlight:
    enabled: false
    description: "Experimental low-light preset."
    disabled_reason: "Enable only after low-light validation shows clear benefit."
    controls:

known_non_blocking_logs:
  - "rkcif-mipi-lvds2: get remote terminal sensor failed -19"
  - "rkisp-vir1: Not active sensor"

known_warnings:
  - "rkcif-mipi-lvds: Warning: vblank need >= 1000us if isp work in online, cur 808 us"
